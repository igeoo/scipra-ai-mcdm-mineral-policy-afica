<line x1="310" y1="180" x2="380" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="630" y1="180" x2="700" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

<text x="350" y="300" class="small">Integrated SCIPRA Framework</text>
