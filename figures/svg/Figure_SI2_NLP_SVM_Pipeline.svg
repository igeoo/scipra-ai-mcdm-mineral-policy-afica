<svg width="1100" height="360" xmlns="http://www.w3.org/2000/svg">

<defs>
  <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
    <path d="M0,0 L10,3 L0,6 Z" fill="#333"/>
  </marker>
  <style>
    .title { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: bold; }
    .label { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #111; }
    .small { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #333; }
  </style>
</defs>

<text x="40" y="40" class="title">NLP–SVM Classification Pipeline</text>

<rect x="40" y="140" width="160" height="80" rx="8" fill="#4C78A8"/>
<text x="60" y="180" fill="white" class="label">Text Corpus</text>

<rect x="240" y="140" width="180" height="80" rx="8" fill="#F58518"/>
<text x="260" y="180" fill="white" class="label">Preprocessing</text>
<text x="260" y="200" fill="white" class="small">Tokenize · Clean</text>

<rect x="460" y="140" width="180" height="80" rx="8" fill="#54A24B"/>
<text x="480" y="180" fill="white" class="label">TF–IDF Features</text>

<rect x="680" y="140" width="160" height="80" rx="8" fill="#E45756"/>
<text x="700" y="180" fill="white" class="label">SVM Model</text>

<rect x="880" y="140" width="180" height="80" rx="8" fill="#72B7B2"/>
<text x="900" y="180" fill="white" class="label">Classification Output</text>

<line x1="200" y1="180" x2="240" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="420" y1="180" x2="460" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="640" y1="180" x2="680" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="840" y1="180" x2="880" y2="180" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

</svg>